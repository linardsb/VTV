services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vtv_db
    ports:
      # SECURITY: Consider removing in production - only needed for direct DB access during development
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  app:
    build:
      context: .
      dockerfile: Dockerfile

    # SECURITY: Internal only - nginx proxies traffic. Uncomment ports for direct access during dev.
    expose:
      - "8123"
    # ports:
    #   - "8123:8123"

    # Volume mounts for development
    # Sync project files but preserve container's .venv
    volumes:
      - .:/app
      - /app/.venv  # Anonymous volume to preserve container's virtual environment

    # Environment variables
    # Load from .env file if present (create one if you need custom values)
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Override DATABASE_URL for Docker networking (app -> db service)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/vtv_db

    # Wait for database to be healthy before starting app
    depends_on:
      db:
        condition: service_healthy

    # Development configuration
    # Uncomment for watch mode (requires Docker Compose 2.22+)
    # develop:
    #   watch:
    #     - action: sync
    #       path: .
    #       target: /app
    #       ignore:
    #         - .venv/
    #     - action: rebuild
    #       path: ./pyproject.toml

    # Optional: Add health check
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8123/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s

    # Restart policy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  cms:
    build:
      context: ./cms/apps/web
      dockerfile: Dockerfile
    # SECURITY: Internal only - nginx proxies traffic. Uncomment ports for direct access during dev.
    expose:
      - "3000"
    # ports:
    #   - "3000:3000"
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://app:8123
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET must be set - run: openssl rand -base64 32}
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
      - cms
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# Named volumes for data persistence
volumes:
  postgres_data:
