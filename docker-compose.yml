services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vtv_db}
    ports:
      # SECURITY: Consider removing in production - only needed for direct DB access during development
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-alpine
    # SECURITY: Production MUST override REDIS_PASSWORD via environment variable
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-devpassword}"]
    ports:
      # SECURITY: Consider removing in production - only needed for direct Redis access during development
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-devpassword}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID

  traccar:
    image: traccar/traccar:6-alpine
    container_name: vtv-traccar
    restart: unless-stopped
    profiles:
      - fleet
    ports:
      - "8082:8082"
      - "5027:5027"
      - "5023:5023"
    volumes:
      - traccar_data:/opt/traccar/data
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
    environment:
      - JAVA_OPTS=-Xmx256m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/api/server"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/docker-migrate.py"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vtv_db}
      - AUTO_IMPORT_GTFS=true
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  app:
    build:
      context: .
      dockerfile: Dockerfile

    # Dev: single uvicorn with hot-reload (overrides Dockerfile's gunicorn CMD)
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8123", "--reload"]

    # SECURITY: Internal only in production - nginx proxies traffic.
    # Ports exposed for development (browser needs direct access for client-side API calls).
    expose:
      - "8123"
    ports:
      - "8123:8123"

    # Volume mounts for development
    # Sync project files but preserve container's .venv
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml
      - ./alembic.ini:/app/alembic.ini
      - /app/.venv  # Anonymous volume to preserve container's virtual environment
      - document_data:/app/data/documents

    # Environment variables
    # Load from .env file if present (create one if you need custom values)
    env_file:
      - path: .env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Uses env var interpolation for credentials - override via .env
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vtv_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-devpassword}@redis:6379/0

    # Wait for database, redis, and migrations before starting app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    # Development configuration
    # Uncomment for watch mode (requires Docker Compose 2.22+)
    # develop:
    #   watch:
    #     - action: sync
    #       path: .
    #       target: /app
    #       ignore:
    #         - .venv/
    #     - action: rebuild
    #       path: ./pyproject.toml

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8123/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Restart policy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  cms:
    build:
      context: ./cms
      dockerfile: apps/web/Dockerfile
    # SECURITY: Internal only - nginx proxies traffic. Uncomment ports for direct access during dev.
    expose:
      - "3000"
    # ports:
    #   - "3000:3000"
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://app:8123
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET must be set}
      - AUTH_TRUST_HOST=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
      cms:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# Named volumes for data persistence
volumes:
  postgres_data:
    name: vtv_postgres_data
    external: true  # Protects DB data from accidental deletion (docker compose down -v won't touch it)
  redis_data:
  traccar_data:
  document_data:
