# SECURITY: Nginx reverse proxy with rate limiting, security headers, and connection limits
# Defense-in-depth layer in front of FastAPI and Next.js

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;

    # Rate limiting zones (per IP)
    # General API: 30 req/s burst 50
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # LLM chat endpoint: 2 req/s burst 5 (expensive operation)
    limit_req_zone $binary_remote_addr zone=llm:10m rate=2r/s;
    # Static/health: 60 req/s burst 100
    limit_req_zone $binary_remote_addr zone=health:10m rate=60r/s;

    # Connection limits per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Logging (includes upstream response time for debugging)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # Body size limit (defense-in-depth with app-level middleware)
    client_max_body_size 1m;

    # Upstream backends (internal only)
    upstream fastapi {
        server app:8123;
    }

    upstream nextjs {
        server cms:3000;
    }

    server {
        listen 80;
        server_name _;

        # Connection limit per IP
        limit_conn addr 20;

        # --- Security Headers ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://cartodb-basemaps-a.global.ssl.fastly.net https://cartodb-basemaps-b.global.ssl.fastly.net https://cartodb-basemaps-c.global.ssl.fastly.net https://cartodb-basemaps-d.global.ssl.fastly.net; connect-src 'self'; font-src 'self'; frame-ancestors 'none'" always;
        add_header X-XSS-Protection "0" always;

        # LLM chat endpoint - strict rate limiting
        location /v1/chat/completions {
            limit_req zone=llm burst=5 nodelay;
            client_max_body_size 100k;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GTFS import and knowledge upload endpoints (large file uploads)
        location /api/v1/schedules/import {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size 10m;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/schedules/validate {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size 10m;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/knowledge {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size 52m;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI API routes (general) — no-cache to prevent stale data
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            add_header Cache-Control "no-store" always;
            add_header X-Content-Type-Options "nosniff" always;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoints
        location /health {
            limit_req zone=health burst=100 nodelay;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastAPI docs and OpenAPI (disabled in production via FastAPI config)
        location /docs {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # V1 models endpoint
        location /v1/models {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js static assets — long cache (hashed filenames)
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Next.js CMS frontend (default)
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- HTTPS Server Block ---
    # Requires cert files at /etc/nginx/certs/. For dev without certs,
    # remove nginx 443 port mapping from docker-compose.
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection limit per IP
        limit_conn addr 20;

        # --- Security Headers ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://cartodb-basemaps-a.global.ssl.fastly.net https://cartodb-basemaps-b.global.ssl.fastly.net https://cartodb-basemaps-c.global.ssl.fastly.net https://cartodb-basemaps-d.global.ssl.fastly.net; connect-src 'self'; font-src 'self'; frame-ancestors 'none'" always;
        add_header X-XSS-Protection "0" always;

        # LLM chat endpoint - strict rate limiting
        location /v1/chat/completions {
            limit_req zone=llm burst=5 nodelay;
            client_max_body_size 100k;

            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # GTFS import and knowledge upload endpoints (large file uploads)
        location /api/v1/schedules/import {
            limit_req zone=api burst=10 nodelay;
            client_max_body_size 10m;

            proxy_pass http://fastapi;
